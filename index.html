<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>満員スイーパー</title>

  <style>
    body {
      background: #222;
      color: white;
      font-family: sans-serif;
      text-align: center;
    }

    h1 {
      margin-top: 20px;
    }

    #game {
      display: grid;
      grid-template-columns: repeat(8, 50px);
      gap: 4px;
      justify-content: center;
      margin-top: 20px;
    }

    .cell {
      width: 50px;
      height: 50px;
      background: #444;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      font-size: 20px;
      border-radius: 4px;
    }

    .safe {
      background: #666;
    }

    .danger {
      background: crimson;
    }
  </style>
</head>
<body>

  <h1>🚃 満員スイーパー</h1>
  <p>安全な場所を探せ！</p>

  <div id="game"></div>

  <script>
    const game = document.getElementById("game");
    const size = 8;

    for (let i = 0; i < size * size; i++) {
      const cell = document.createElement("div");
      cell.className = "cell";

      const danger = Math.random() < 0.2;

      cell.onclick = () => {
        if (danger) {
          cell.classList.add("danger");
          cell.textContent = "💀";
          alert("圧死した！");
        } else {
          cell.classList.add("safe");
          cell.textContent = "🧍";
        }
      };

      game.appendChild(cell);
    }
  </script>

</body>
</html>
