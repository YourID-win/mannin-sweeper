<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>満員スイーパー</title>

<style>

body{
  background:#111;
  color:white;
  font-family:sans-serif;
  text-align:center;
  margin:0;
  padding:20px;
}

h1{
  margin-bottom:5px;
}

p{
  color:#bbb;
}

#rules{
  background:#222;
  padding:15px;
  border-radius:12px;
  width:fit-content;
  margin:20px auto;
  text-align:left;
  max-width:700px;
}

#rules ul{
  line-height:1.8;
}

#topbar{
  margin-bottom:20px;
}

select,
button{
  padding:10px;
  border:none;
  border-radius:10px;
  font-size:16px;
  margin:5px;
}

button{
  cursor:pointer;
  background:#4fc3f7;
  font-weight:bold;
}

button:hover{
  opacity:0.85;
}

#train{
  background:#bdbdbd;
  border:10px solid #666;
  border-radius:24px;
  padding:20px;
  width:fit-content;
  margin:auto;
  position:relative;
}

#doors{
  display:flex;
  justify-content:space-between;
  margin-bottom:12px;
}

.door{
  width:120px;
  height:14px;
  background:#4fc3f7;
  border-radius:10px;
}

#game{
  display:grid;
  gap:4px;
}

.cell{
  width:42px;
  height:42px;

  background:#444;
  border-radius:6px;

  display:flex;
  align-items:center;
  justify-content:center;

  font-weight:bold;
  font-size:18px;

  user-select:none;
  cursor:pointer;

  transition:0.1s;
}

.cell:hover{
  transform:scale(1.05);
}

.open{
  background:#8d8d8d;
}

.mine{
  background:crimson;
}

.safe{
  background:#2e7d32;
}

.number1{ color:#4fc3f7; }
.number2{ color:#81c784; }
.number3{ color:#ffb74d; }
.number4,
.number5,
.number6,
.number7,
.number8{
  color:#ef5350;
}

#status{
  margin-top:20px;
  font-size:20px;
  min-height:30px;
}

@media(max-width:700px){

  .cell{
    width:30px;
    height:30px;
    font-size:14px;
  }

}

</style>
</head>

<body>

<h1>🚃 満員スイーパー</h1>

<p>
満員電車の中で、
圧縮されない安全地帯を見つけ出そう
</p>

<div id="rules">

<h2>📖 遊び方</h2>

<ul>
<li>🟩 安全に立てる場所を見つけよう</li>
<li>💀 危険地帯を開くと身動きが取れなくなる</li>
<li>🔢 数字は周囲8マスの危険人数</li>
<li>🚩 右クリックで危険地帯をマーク</li>
<li>🚉 すべての安全地帯を開けばクリア</li>
</ul>

</div>

<div id="topbar">

<select id="modeSelect">
  <option value="normal">普通電車</option>
  <option value="rush">通勤ラッシュ</option>
  <option value="hell">山手線地獄</option>
</select>

<button id="restartBtn">
🔄 リスタート
</button>

</div>

<div id="train">

<div id="doors">
  <div class="door"></div>
  <div class="door"></div>
</div>

<div id="game"></div>

</div>

<div id="status"></div>

<script>

const game = document.getElementById("game");
const statusText = document.getElementById("status");
const restartBtn = document.getElementById("restartBtn");
const modeSelect = document.getElementById("modeSelect");

let width = 12;
let height = 6;
let mineCount = 14;

let board = [];
let gameOver = false;

function setMode(){

  const mode = modeSelect.value;

  if(mode === "normal"){
    width = 12;
    height = 6;
    mineCount = 14;
  }

  if(mode === "rush"){
    width = 16;
    height = 7;
    mineCount = 28;
  }

  if(mode === "hell"){
    width = 20;
    height = 8;
    mineCount = 45;
  }

}

function init(){

  setMode();

  gameOver = false;

  board = [];

  game.style.gridTemplateColumns =
    `repeat(${width}, 42px)`;

  for(let y=0; y<height; y++){

    board[y] = [];

    for(let x=0; x<width; x++){

      board[y][x] = {
        mine:false,
        open:false,
        flag:false,
        count:0,
        element:null
      };

    }

  }

  placeMines();
  calculateNumbers();
  drawBoard();

  statusText.textContent =
    "🚉 安全地帯を探そう";

}

function placeMines(){

  let placed = 0;

  while(placed < mineCount){

    const x =
      Math.floor(Math.random() * width);

    const y =
      Math.floor(Math.random() * height);

    if(!board[y][x].mine){

      board[y][x].mine = true;
      placed++;

    }

  }

}

function calculateNumbers(){

  for(let y=0; y<height; y++){

    for(let x=0; x<width; x++){

      let count = 0;

      for(let dy=-1; dy<=1; dy++){
        for(let dx=-1; dx<=1; dx++){

          const ny = y + dy;
          const nx = x + dx;

          if(
            ny >= 0 &&
            ny < height &&
            nx >= 0 &&
            nx < width &&
            board[ny][nx].mine
          ){
            count++;
          }

        }
      }

      if(board[y][x].mine){
        count--;
      }

      board[y][x].count = count;

    }

  }

}

function drawBoard(){

  game.innerHTML = "";

  for(let y=0; y<height; y++){

    for(let x=0; x<width; x++){

      const cell =
        document.createElement("div");

      cell.className = "cell";

      cell.onclick = () => {
        openCell(x,y);
      };

      cell.oncontextmenu = (e) => {

        e.preventDefault();

        toggleFlag(x,y);

      };

      board[y][x].element = cell;

      game.appendChild(cell);

    }

  }

}

function toggleFlag(x,y){

  if(gameOver){
    return;
  }

  const data = board[y][x];

  if(data.open){
    return;
  }

  data.flag = !data.flag;

  data.element.textContent =
    data.flag ? "🚩" : "";

}

function openCell(x,y){

  if(gameOver){
    return;
  }

  const data = board[y][x];

  if(data.open || data.flag){
    return;
  }

  data.open = true;

  const cell = data.element;

  cell.classList.add("open");

  if(data.mine){

    cell.textContent = "💥";
    cell.classList.add("mine");

    revealAll();

    statusText.textContent =
      "💀 圧縮されて身動きが取れなくなった…";

    gameOver = true;

    return;

  }

  if(data.count > 0){

    cell.textContent = data.count;
    cell.classList.add("number" + data.count);

  }else{

    cell.textContent = "🟩";
    cell.classList.add("safe");

    for(let dy=-1; dy<=1; dy++){
      for(let dx=-1; dx<=1; dx++){

        const nx = x + dx;
        const ny = y + dy;

        if(
          nx >= 0 &&
          nx < width &&
          ny >= 0 &&
          ny < height
        ){
          openCell(nx,ny);
        }

      }
    }

  }

  checkWin();

}

function revealAll(){

  for(let y=0; y<height; y++){
    for(let x=0; x<width; x++){

      const data = board[y][x];

      if(data.mine){

        data.element.textContent = "💀";
        data.element.classList.add("mine");

      }

    }
  }

}

function checkWin(){

  let opened = 0;

  for(let y=0; y<height; y++){
    for(let x=0; x<width; x++){

      if(
        !board[y][x].mine &&
        board[y][x].open
      ){
        opened++;
      }

    }
  }

  if(
    opened ===
    (width * height - mineCount)
  ){

    statusText.textContent =
      "🚉 生還成功！安全地帯を確保した！";

    revealAll();

    gameOver = true;

  }

}

restartBtn.onclick = () => {
  init();
};

modeSelect.onchange = () => {
  init();
};

init();

</script>

</body>
</html>
